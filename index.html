<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cable Match</title>
  <style>
    :root {
      --bg: #f3f5f8;
      --panel: #ffffff;
      --border: #cfd8e3;
      --text: #1f2937;
      --accent: #2563eb;
      --good: #16a34a;
      --bad: #dc2626;
      --muted: #6b7280;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin: 0 0 14px;
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 14px;
    }

    button {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover { border-color: var(--accent); }

    #score {
      text-align: center;
      min-height: 1.4em;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .board {
      display: grid;
      grid-template-columns: 1.35fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .left-list {
      display: grid;
      gap: 12px;
    }

    .match-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid #e5eaf1;
      border-radius: 10px;
      background: #fafcff;
    }

    .connector-img {
      width: 120px;
      height: 84px;
      object-fit: cover;
      border: 1px solid #d8e0ea;
      border-radius: 8px;
      background: #fff;
    }

    .drop-zone {
      min-height: 56px;
      border: 2px dashed #9aa6b2;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      background: #fff;
      position: relative;
      transition: border-color .15s, background .15s;
    }

    .drop-zone.hover {
      border-color: var(--accent);
      background: #eff6ff;
    }

    .drop-zone.correct {
      border-style: solid;
      border-color: var(--good);
      background: #f0fdf4;
    }

    .drop-zone.incorrect {
      border-style: solid;
      border-color: var(--bad);
      background: #fef2f2;
    }

    .drop-zone .mark {
      position: absolute;
      right: 8px;
      top: 6px;
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
    }

    .drop-zone.correct .mark { color: var(--good); }
    .drop-zone.incorrect .mark { color: var(--bad); }

    .placeholder {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .label-bank {
      display: grid;
      gap: 10px;
      min-height: 220px;
      align-content: start;
    }

    .label-card {
      user-select: none;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      font-weight: 700;
      text-align: center;
      cursor: grab;
      box-shadow: 0 1px 0 rgba(0,0,0,.03);
    }

    .label-card:active { cursor: grabbing; }

    .label-card.selected {
      outline: 3px solid #93c5fd;
      border-color: var(--accent);
      background: #eff6ff;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 15px;
      color: #374151;
    }

    @media (max-width: 860px) {
      .board { grid-template-columns: 1fr; }
      .match-row { grid-template-columns: 100px 1fr; }
      .connector-img { width: 100px; height: 72px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Cable Match</h1>

    <div class="controls">
      <button id="submitBtn" type="button">Submit</button>
      <button id="resetWrongBtn" type="button">Reset Wrong</button>
      <button id="newRoundBtn" type="button">New Round</button>
    </div>

    <div id="score" aria-live="polite"></div>

    <div class="board">
      <section class="panel">
        <h2 class="section-title">Connectors</h2>
        <div id="leftList" class="left-list"></div>
      </section>

      <section class="panel">
        <h2 class="section-title">Labels (drag or tap)</h2>
        <div id="labelBank" class="label-bank"></div>
      </section>
    </div>
  </div>

  <script>
    const connectors = [
      { file: 'dvi.png', answer: 'DVI' },
      { file: 'usb.png', answer: 'USB' },
      { file: 'esata.png', answer: 'eSATA' },
      { file: 'hdmi.png', answer: 'HDMI' },
      { file: 'ethernet.png', answer: 'Ethernet' }
    ];

    const labels = ['USB', 'HDMI', 'Ethernet', 'DVI', 'eSATA'];

    const leftList = document.getElementById('leftList');
    const labelBank = document.getElementById('labelBank');
    const scoreEl = document.getElementById('score');
    const submitBtn = document.getElementById('submitBtn');
    const resetWrongBtn = document.getElementById('resetWrongBtn');
    const newRoundBtn = document.getElementById('newRoundBtn');

    let selectedCard = null;
    let draggedText = null;

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function createPlaceholder() {
      const p = document.createElement('div');
      p.className = 'placeholder';
      p.textContent = 'Drop label here';
      return p;
    }

    function createCard(text) {
      const card = document.createElement('div');
      card.className = 'label-card';
      card.textContent = text;
      card.draggable = true;
      card.dataset.label = text;

      card.addEventListener('dragstart', () => {
        draggedText = text;
      });

      card.addEventListener('dragend', () => {
        draggedText = null;
      });

      card.addEventListener('click', () => {
        document.querySelectorAll('.label-card.selected').forEach(c => c.classList.remove('selected'));
        if (selectedCard === card) {
          selectedCard = null;
          return;
        }
        selectedCard = card;
        card.classList.add('selected');
      });

      return card;
    }

    function clearZoneFeedback(zone) {
      zone.classList.remove('correct', 'incorrect');
      const mark = zone.querySelector('.mark');
      if (mark) mark.remove();
    }

    function placeLabelInZone(zone, labelText) {
      if (zone.dataset.locked === 'true') return;

      const oldCard = zone.querySelector('.label-card');
      if (oldCard) {
        oldCard.draggable = true;
        labelBank.appendChild(oldCard);
      }

      const srcCard = Array.from(labelBank.querySelectorAll('.label-card')).find(c => c.dataset.label === labelText);
      if (!srcCard) return;

      const placeholder = zone.querySelector('.placeholder');
      if (placeholder) placeholder.remove();

      srcCard.classList.remove('selected');
      srcCard.draggable = false;
      zone.appendChild(srcCard);

      selectedCard = null;
      clearZoneFeedback(zone);
      scoreEl.textContent = '';
    }

    function makeDropZone(connector) {
      const zone = document.createElement('div');
      zone.className = 'drop-zone';
      zone.dataset.answer = connector.answer;
      zone.dataset.locked = 'false';
      zone.appendChild(createPlaceholder());

      zone.addEventListener('dragover', (e) => {
        if (zone.dataset.locked === 'true') return;
        e.preventDefault();
        zone.classList.add('hover');
      });

      zone.addEventListener('dragleave', () => {
        zone.classList.remove('hover');
      });

      zone.addEventListener('drop', (e) => {
        if (zone.dataset.locked === 'true') return;
        e.preventDefault();
        zone.classList.remove('hover');
        if (draggedText) placeLabelInZone(zone, draggedText);
      });

      zone.addEventListener('click', () => {
        if (zone.dataset.locked === 'true') return;
        if (selectedCard) {
          placeLabelInZone(zone, selectedCard.dataset.label);
        }
      });

      return zone;
    }

    function renderLeft() {
      leftList.innerHTML = '';
      connectors.forEach((item) => {
        const row = document.createElement('div');
        row.className = 'match-row';

        const img = document.createElement('img');
        img.className = 'connector-img';
        img.src = item.file;
        img.alt = item.answer + ' connector';

        const zone = makeDropZone(item);

        row.appendChild(img);
        row.appendChild(zone);
        leftList.appendChild(row);
      });
    }

    function renderLabels(order = shuffle(labels)) {
      labelBank.innerHTML = '';
      order.forEach(text => labelBank.appendChild(createCard(text)));
    }

    function allZones() {
      return Array.from(document.querySelectorAll('.drop-zone'));
    }

    function clearAllFeedback() {
      allZones().forEach(clearZoneFeedback);
      scoreEl.textContent = '';
    }

    function submit() {
      let correct = 0;
      allZones().forEach(zone => {
        clearZoneFeedback(zone);

        const card = zone.querySelector('.label-card');
        const placed = card ? card.dataset.label : null;
        const isCorrect = placed && placed === zone.dataset.answer;

        const mark = document.createElement('span');
        mark.className = 'mark';

        if (isCorrect) {
          correct += 1;
          zone.classList.add('correct');
          zone.dataset.locked = 'true';
          mark.textContent = '✓';
        } else {
          zone.classList.add('incorrect');
          zone.dataset.locked = 'false';
          mark.textContent = '✗';
        }

        zone.appendChild(mark);
      });

      scoreEl.textContent = `${correct}/5 correct. Fix the red ones and submit again.`;
    }

    function resetWrong() {
      const returned = [];

      allZones().forEach(zone => {
        const card = zone.querySelector('.label-card');
        const isLockedCorrect = zone.dataset.locked === 'true';

        if (!isLockedCorrect && card) {
          card.draggable = true;
          card.classList.remove('selected');
          returned.push(card.dataset.label);
          card.remove();
        }

        clearZoneFeedback(zone);

        if (!isLockedCorrect && !zone.querySelector('.placeholder')) {
          zone.appendChild(createPlaceholder());
        }
      });

      document.querySelectorAll('.label-card.selected').forEach(c => c.classList.remove('selected'));
      selectedCard = null;

      const bankLabels = Array.from(labelBank.querySelectorAll('.label-card')).map(c => c.dataset.label);
      const shuffled = shuffle([...bankLabels, ...returned]);
      renderLabels(shuffled);
      scoreEl.textContent = '';
    }

    function newRound() {
      selectedCard = null;
      draggedText = null;
      renderLeft();
      renderLabels(shuffle(labels));
      clearAllFeedback();
    }

    submitBtn.addEventListener('click', submit);
    resetWrongBtn.addEventListener('click', resetWrong);
    newRoundBtn.addEventListener('click', newRound);

    newRound();
  </script>
</body>
</html>
